name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

  #Needed only if you later enable github merge queue
  #merge_queue:

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{github-workflow}}-${{github.ref}}
  cancel-in-progress: true

jobs:
  admin:
    name: Admin | lint and build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/admin/kos-admin

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: apps/admin/kos-admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Lint  
        run: npm run lint

      - name: Build Admin Application
        run: npm run build

backend:
    name: Backend | lint and build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/backend/kos-backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: apps/backend/kos-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Lint  
        run: npm run lint

      - name: Build Backend Application
        run: npm run build

mobile:
    name: Mobile | lint and build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/mobile/kos-mobile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Analyze Flutter Application
        run: flutter analyze

      - name: Run Flutter tests
        run: flutter test

checkmarx:
    name: Checkmarx | Scan
    runs-on: ubuntu-latest
    needs: [admin, backend, mobile]

    if : >
      github.event_name != 'pull_request' && github.base_ref == 'main' || 
      github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.base.ref == 'main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 

      - name: Run Checkmarx Scan
        uses: checkmarxdev/ast-github-action@2.3.39
        with:
         project-name: "kos-restaurant"
         cx_tenant: ${{ secrets.CX_TENANT }}
         base-url: ${{ secrets.CX_BASE_URL }}
         cx_client_id: ${{ secrets.CX_CLIENT_ID }} 
         cx_client_secret: ${{ secrets.CX_CLIENT_SECRET }}